# EngPulse detector thresholds — admin-tunable, no values hard-coded in code.
# Loaded into engpulse.metrics.thresholds.Thresholds; any key omitted here falls
# back to the model default.

pr_flow:
  stale_pr_days: 7          # open PR with no activity for this many days → stale
  abandoned_pr_days: 30     # open PR untouched this long → abandoned
  oversized_pr_lines: 500   # additions + deletions above this → oversized
  oversized_pr_files: 20    # changed files above this → oversized
  reviewer_concentration: 0.5  # one reviewer handling > this share → bottleneck

ci_health:
  flaky_min_runs: 2             # min runs on a SHA before flakiness is considered
  duration_regression_pct: 0.5  # workflow latest/earliest growth above this → regression
  duration_min_runs: 3          # min runs before a duration trend is reported

delivery:
  stale_issue_days: 10          # non-done issue untouched this long → stale
  deadline_drift_min_moves: 2   # due-date moved at least this many times → drift
  reestimation_min_changes: 1   # estimate changed at least this many times → re-estimation

knowledge:
  bus_factor_max_owners: 1      # a module with at most this many owners is at risk
  bus_factor_min_commits: 2     # …only if it has at least this many commits (real churn)
