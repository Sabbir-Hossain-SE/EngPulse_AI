# Full-stack scaffold: Postgres+pgvector, Redis, Langfuse, the API, and the
# worker. Only Postgres is required to verify the scaffold; the rest are wired
# now so the deployment shape is real from milestone one.
#
#   docker compose up -d postgres          # minimum needed to verify
#   docker compose up -d                    # bring up the whole stack

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: engpulse
      POSTGRES_PASSWORD: engpulse
      POSTGRES_DB: engpulse
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U engpulse"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Self-hosted Langfuse (tracing). Uses its own Postgres so EngPulse data and
  # trace data stay separate. Not exercised until the observability milestone.
  langfuse-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - langfusedata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 5s
      timeout: 5s
      retries: 10

  langfuse:
    image: langfuse/langfuse:2
    depends_on:
      langfuse-db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: changeme-dev-secret
      SALT: changeme-dev-salt
      TELEMETRY_ENABLED: "false"

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://engpulse:engpulse@postgres:5432/engpulse
      REDIS_URL: redis://redis:6379/0
      LANGFUSE_HOST: http://langfuse:3000
    ports:
      - "8000:8000"

  worker:
    build: .
    depends_on:
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://engpulse:engpulse@postgres:5432/engpulse
      REDIS_URL: redis://redis:6379/0
    command: ["celery", "-A", "engpulse.worker.celery_app:celery_app", "worker", "--loglevel=info"]

volumes:
  pgdata:
  langfusedata:
